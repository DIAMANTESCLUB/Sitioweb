<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLUB DIAMANTES TUXPAN</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#1b1b1b;
color:white;
}

/* HEADER */

header{
background:linear-gradient(90deg,#dc2626,#991b1b);
padding:18px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

header h1{
margin:0;
font-size:28px;
}

/* REDES */

.redes{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
padding:15px;
background:#111;
}

.redes a{
text-decoration:none;
color:white;
font-size:16px;
padding:10px 16px;
border-radius:8px;
display:flex;
align-items:center;
gap:8px;
transition:0.3s;
}

.facebook{background:#1877f2;}
.tiktok{background:#111;}
.whatsapp{background:#22c55e;}

.redes a:hover{
transform:scale(1.08);
}

/* LOGO */

.logos{
display:flex;
justify-content:center;
padding:25px;
}

.logo img{
width:120px;
max-width:80%;
}

/* GALERIA */

.galeria{
max-width:1000px;
margin:auto;
padding:20px;
}

.galeria h2{
text-align:center;
margin-bottom:10px;
}

.fotos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:12px;
margin-top:20px;
}

.foto img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.foto img:hover{
transform:scale(1.05);
}

/* BOTON */

.boton-fotos{
display:block;
width:200px;
margin:25px auto;
padding:12px;
text-align:center;
background:#dc2626;
color:white;
text-decoration:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
transition:0.3s;
}

.boton-fotos:hover{
background:#991b1b;
transform:scale(1.05);
}

/* VISOR */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.lightbox span{
position:absolute;
top:20px;
right:25px;
font-size:40px;
cursor:pointer;
color:white;
}

/* MENSAJES */

#mensajes{
max-width:700px;
margin:auto;
padding:20px;
}

.mensaje{
background:#262626;
padding:18px;
margin:12px 0;
border-radius:10px;
border-left:5px solid #dc2626;
box-shadow:0 5px 10px rgba(0,0,0,0.5);
}

/* FOOTER */

footer{
text-align:center;
padding:18px;
background:#111;
font-size:14px;
}

/* RESPONSIVE EXTRA */

@media (max-width:600px){

header h1{
font-size:22px;
}

.redes a{
font-size:14px;
padding:8px 12px;
}

.foto img{
height:130px;
}

}

</style>

</head>
<body>

<header>
<h1>🏐 CLUB DEPORTIVO DIAMANTES</h1>
</header>

<!-- REDES -->

<div class="redes">

<a class="facebook" href="https://facebook.com" target="_blank">
<i class="fab fa-facebook"></i> Facebook
</a>

<a class="tiktok" href="https://tiktok.com" target="_blank">
<i class="fab fa-tiktok"></i> TikTok
</a>

<a class="whatsapp" href="https://wa.me/5210000000000" target="_blank">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>

</div>

<!-- LOGO -->

<div class="logos">
<div class="logo">
<img src="logo1.PNG">
</div>
</div>

<!-- GALERIA -->

<div class="galeria">

<h2>📸 Entrenamientos</h2>

<div class="fotos">

<div class="foto">
<img src="foto 1.PNG" onclick="abrirImagen(this.src)">
</div>

<div class="foto">
<img src="f2.PNG" onclick="abrirImagen(this.src)">
</div>

<div class="foto">
<img src="f3.PNG" onclick="abrirImagen(this.src)">
</div>

<div class="foto">
<img src="f4.PNG" onclick="abrirImagen(this.src)">
</div>

</div>

</div>

<a href="fotos.html" class="boton-fotos">
📸 Ver todas las fotos
</a>

<h2 style="text-align:center;">💬 Mensajes</h2>

<div id="mensajes"></div>

<footer>
Equipo deportivo | Plataforma de mensajes
</footer>

<!-- VISOR -->

<div id="visor" class="lightbox">

<span onclick="cerrarImagen()">×</span>

<img id="imagenGrande">

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDnjyVkkqz8J7aN6xFN2oyDVT3sHgmYZUI",
authDomain: "voleyweb-82f7d.firebaseapp.com",
projectId: "voleyweb-82f7d",
storageBucket: "voleyweb-82f7d.firebasestorage.app",
messagingSenderId: "1081023239285",
appId: "1:1081023239285:web:084825db1699ac97b2543c",
measurementId: "G-BYFGNWEWJW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const contenedor = document.getElementById("mensajes");

onSnapshot(collection(db,"mensajes"),(snapshot)=>{

contenedor.innerHTML="";

snapshot.forEach((doc)=>{

let div=document.createElement("div");
div.className="mensaje";
div.textContent=doc.data().texto;

contenedor.appendChild(div);

});

});

</script>

<script>

function abrirImagen(src){
document.getElementById("visor").style.display="flex";
document.getElementById("imagenGrande").src=src;
}

function cerrarImagen(){
document.getElementById("visor").style.display="none";
}

</script>

</body>
</html>
